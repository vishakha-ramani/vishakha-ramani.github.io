<svg viewBox="0 0 640 270" role="img" aria-label="One batched iteration decomposed into baseline overhead plus per-request compute and memory work" xmlns="http://www.w3.org/2000/svg">
  <!-- iteration bar -->
  <text x="60" y="52" font-size="12" style="fill: var(--fig-muted)">one iteration of the batch</text>
  <rect x="60" y="64" width="106" height="36" rx="4" style="fill: var(--fig-muted)" opacity="0.35"/>
  <text x="113" y="87" text-anchor="middle" font-size="13" font-weight="600" style="fill: var(--fig-line)">&#945;</text>

  <rect x="170" y="64" width="72" height="36" style="fill: var(--fig-rcu)"/>
  <rect x="244" y="64" width="46" height="36" style="fill: var(--fig-rwl)"/>
  <rect x="294" y="64" width="72" height="36" style="fill: var(--fig-rcu)"/>
  <rect x="368" y="64" width="46" height="36" style="fill: var(--fig-rwl)"/>
  <rect x="418" y="64" width="72" height="36" style="fill: var(--fig-rcu)"/>
  <rect x="492" y="64" width="46" height="36" style="fill: var(--fig-rwl)"/>
  <rect x="542" y="64" width="58" height="36" rx="4" stroke-dasharray="4 3" style="fill: none; stroke: var(--fig-muted); stroke-width: 1.25"/>
  <text x="571" y="87" text-anchor="middle" font-size="12" style="fill: var(--fig-muted)">&#8230;</text>

  <text x="230" y="118" text-anchor="middle" font-size="11" style="fill: var(--fig-muted)">request 1</text>
  <text x="354" y="118" text-anchor="middle" font-size="11" style="fill: var(--fig-muted)">request 2</text>
  <text x="478" y="118" text-anchor="middle" font-size="11" style="fill: var(--fig-muted)">request 3</text>

  <!-- key -->
  <rect x="70" y="146" width="16" height="10" rx="2" style="fill: var(--fig-muted)" opacity="0.35"/>
  <text x="94" y="155" font-size="12" style="fill: var(--fig-line)">&#945;, the iteration's own overhead, kernel launches and weight loading</text>
  <rect x="70" y="172" width="16" height="10" rx="2" style="fill: var(--fig-rcu)"/>
  <text x="94" y="181" font-size="12" style="fill: var(--fig-line)">&#946;, compute time per token, set by arithmetic throughput</text>
  <rect x="70" y="198" width="16" height="10" rx="2" style="fill: var(--fig-rwl)"/>
  <text x="94" y="207" font-size="12" style="fill: var(--fig-line)">&#947;, memory time per token of KV cache, set by memory bandwidth</text>

  <text x="330" y="246" text-anchor="middle" font-size="12.5" font-weight="600" style="fill: var(--fig-line)">with N requests in the batch, the iteration takes &#945; + N&#948;</text>
</svg>
