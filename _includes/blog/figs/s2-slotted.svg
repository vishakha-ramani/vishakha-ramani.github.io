<svg viewBox="0 0 640 250" role="img" aria-label="A slotted system where a writer publishes with probability p and a reader pays c to sample" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="s2sl-a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" style="fill: var(--fig-line)"/>
    </marker>
    <marker id="s2sl-m" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" style="fill: var(--fig-muted)"/>
    </marker>
  </defs>

  <!-- writer -->
  <rect x="30" y="60" width="86" height="46" rx="6" style="fill: none; stroke: var(--fig-line); stroke-width: 1.5"/>
  <text x="73" y="88" text-anchor="middle" font-size="12.5" style="fill: var(--fig-line)">Writer</text>

  <!-- memory -->
  <line x1="116" y1="83" x2="162" y2="83" style="stroke: var(--fig-line); stroke-width: 1.5" marker-end="url(#s2sl-a)"/>
  <text x="139" y="72" text-anchor="middle" font-size="10.5" style="fill: var(--fig-muted)">publish</text>
  <rect x="166" y="55" width="110" height="56" rx="3" style="fill: none; stroke: var(--fig-line); stroke-width: 1.25"/>
  <line x1="166" y1="83" x2="276" y2="83" style="stroke: var(--fig-line); stroke-width: 0.75"/>
  <text x="221" y="45" text-anchor="middle" font-size="12" style="fill: var(--fig-muted)">memory, age x</text>

  <!-- reader -->
  <line x1="276" y1="83" x2="322" y2="83" style="stroke: var(--fig-line); stroke-width: 1.5" marker-end="url(#s2sl-a)"/>
  <text x="299" y="72" text-anchor="middle" font-size="10.5" style="fill: var(--fig-muted)">sample</text>
  <rect x="326" y="60" width="120" height="46" rx="6" style="fill: none; stroke: var(--fig-line); stroke-width: 1.5"/>
  <text x="386" y="88" text-anchor="middle" font-size="12.5" style="fill: var(--fig-line)">Reader</text>
  <text x="386" y="126" text-anchor="middle" font-size="11" style="fill: var(--fig-muted)">each slot, idle or pay c to read</text>

  <!-- client -->
  <line x1="446" y1="83" x2="492" y2="83" style="stroke: var(--fig-line); stroke-width: 1.5" marker-end="url(#s2sl-a)"/>
  <circle cx="530" cy="83" r="28" style="fill: none; stroke: var(--fig-line); stroke-width: 1.5"/>
  <text x="530" y="88" text-anchor="middle" font-size="12" style="fill: var(--fig-line)">Client</text>
  <text x="530" y="130" text-anchor="middle" font-size="11" style="fill: var(--fig-muted)">age y</text>

  <!-- slot ruler -->
  <line x1="60" y1="190" x2="580" y2="190" style="stroke: var(--fig-muted); stroke-width: 1.1" marker-end="url(#s2sl-m)"/>
  <line x1="100" y1="185" x2="100" y2="195" style="stroke: var(--fig-muted); stroke-width: 1"/>
  <line x1="160" y1="185" x2="160" y2="195" style="stroke: var(--fig-muted); stroke-width: 1"/>
  <line x1="220" y1="185" x2="220" y2="195" style="stroke: var(--fig-muted); stroke-width: 1"/>
  <line x1="280" y1="185" x2="280" y2="195" style="stroke: var(--fig-muted); stroke-width: 1"/>
  <line x1="340" y1="185" x2="340" y2="195" style="stroke: var(--fig-muted); stroke-width: 1"/>
  <line x1="400" y1="185" x2="400" y2="195" style="stroke: var(--fig-muted); stroke-width: 1"/>
  <line x1="460" y1="185" x2="460" y2="195" style="stroke: var(--fig-muted); stroke-width: 1"/>
  <line x1="520" y1="185" x2="520" y2="195" style="stroke: var(--fig-muted); stroke-width: 1"/>
  <path d="M155 172 L165 172 L160 181 z" style="fill: var(--fig-muted)"/>
  <path d="M215 172 L225 172 L220 181 z" style="fill: var(--fig-muted)"/>
  <path d="M395 172 L405 172 L400 181 z" style="fill: var(--fig-muted)"/>
  <path d="M515 172 L525 172 L520 181 z" style="fill: var(--fig-muted)"/>
  <text x="320" y="220" text-anchor="middle" font-size="11.5" style="fill: var(--fig-muted)">slotted time, a fresh update lands in a slot with probability p</text>
</svg>
