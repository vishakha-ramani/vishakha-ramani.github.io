<svg viewBox="0 0 640 300" role="img" aria-label="Power grows as the fifth power of processing speed" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="s2pw-m" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" style="fill: var(--fig-muted)"/>
    </marker>
  </defs>

  <!-- axes -->
  <line x1="80" y1="242" x2="612" y2="242" style="stroke: var(--fig-muted); stroke-width: 1.25" marker-end="url(#s2pw-m)"/>
  <line x1="80" y1="242" x2="80" y2="38" style="stroke: var(--fig-muted); stroke-width: 1.25" marker-end="url(#s2pw-m)"/>
  <text x="340" y="272" text-anchor="middle" font-size="12.5" style="fill: var(--fig-muted)">processing speed</text>
  <text x="56" y="140" text-anchor="middle" font-size="12.5" style="fill: var(--fig-muted)" transform="rotate(-90 56 140)">power drawn</text>

  <!-- the fifth-power curve -->
  <path d="M100 238 C260 236 380 228 450 190 C510 156 545 100 565 52" fill="none" style="stroke: var(--fig-rcu); stroke-width: 2"/>

  <!-- 1x marker -->
  <circle cx="300" cy="233" r="4.5" style="fill: var(--fig-line)"/>
  <line x1="300" y1="233" x2="300" y2="242" stroke-dasharray="2 3" style="stroke: var(--fig-muted); stroke-width: 0.8"/>
  <text x="300" y="215" text-anchor="middle" font-size="12" style="fill: var(--fig-line)">1&#215; speed, 1&#215; power</text>

  <!-- 2x marker -->
  <circle cx="551" cy="82" r="4.5" style="fill: var(--fig-line)"/>
  <line x1="551" y1="82" x2="551" y2="242" stroke-dasharray="2 3" style="stroke: var(--fig-muted); stroke-width: 0.8"/>
  <text x="455" y="66" text-anchor="middle" font-size="12" font-weight="600" style="fill: var(--fig-line)">2&#215; speed, 32&#215; power</text>

  <text x="230" y="120" text-anchor="middle" font-size="12" style="fill: var(--fig-muted)">at this exchange rate, freshness</text>
  <text x="230" y="136" text-anchor="middle" font-size="12" style="fill: var(--fig-muted)">cannot be bought with speed alone</text>
</svg>
