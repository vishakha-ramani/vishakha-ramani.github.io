<svg viewBox="0 0 640 300" role="img" aria-label="The age at the monitor tracks the age at the reader with a fixed average lag equal to the mean computation time" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="s2lg-m" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" style="fill: var(--fig-muted)"/>
    </marker>
  </defs>

  <!-- axes -->
  <line x1="60" y1="252" x2="612" y2="252" style="stroke: var(--fig-muted); stroke-width: 1.25" marker-end="url(#s2lg-m)"/>
  <line x1="60" y1="252" x2="60" y2="40" style="stroke: var(--fig-muted); stroke-width: 1.25" marker-end="url(#s2lg-m)"/>
  <text x="340" y="282" text-anchor="middle" font-size="12.5" style="fill: var(--fig-muted)">time</text>
  <text x="38" y="146" text-anchor="middle" font-size="12.5" style="fill: var(--fig-muted)" transform="rotate(-90 38 146)">average age</text>

  <!-- legend -->
  <rect x="80" y="52" width="18" height="4" rx="2" style="fill: var(--fig-rcu)"/>
  <text x="104" y="58" font-size="12" style="fill: var(--fig-line)">age at the reader</text>
  <rect x="235" y="52" width="18" height="4" rx="2" style="fill: var(--fig-rwl)"/>
  <text x="259" y="58" font-size="12" style="fill: var(--fig-line)">age at the monitor</text>

  <!-- input age sawtooth (reader) -->
  <path d="M80 210 L170 168 L170 218 L280 166 L280 222 L400 158 L400 220 L510 170 L510 224 L580 196"
        fill="none" style="stroke: var(--fig-rcu); stroke-width: 2"/>
  <!-- monitor age, same shape shifted up by the lag -->
  <path d="M80 150 L170 108 L170 158 L280 106 L280 162 L400 98 L400 160 L510 110 L510 164 L580 136"
        fill="none" style="stroke: var(--fig-rwl); stroke-width: 2"/>

  <!-- the fixed gap -->
  <line x1="455" y1="140" x2="455" y2="190" style="stroke: var(--fig-line); stroke-width: 1.25" marker-start="url(#s2lg-m)" marker-end="url(#s2lg-m)"/>
  <text x="470" y="78" text-anchor="middle" font-size="12" font-weight="600" style="fill: var(--fig-line)">the gap is exactly the mean computation time</text>
  <line x1="464" y1="84" x2="456" y2="134" style="stroke: var(--fig-muted); stroke-width: 0.8"/>
</svg>
