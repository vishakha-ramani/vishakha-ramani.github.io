<svg viewBox="0 0 640 270" role="img" aria-label="Two sources publish through a writer into shared memory, a decision process reads, computes, and delivers to a monitor" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="s2pl-a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" style="fill: var(--fig-line)"/>
    </marker>
  </defs>

  <!-- sources -->
  <circle cx="48" cy="80" r="15" style="fill: none; stroke: var(--fig-line); stroke-width: 1.5"/>
  <circle cx="48" cy="160" r="15" style="fill: none; stroke: var(--fig-line); stroke-width: 1.5"/>
  <text x="48" y="52" text-anchor="middle" font-size="12" style="fill: var(--fig-line)">Source 1</text>
  <text x="48" y="196" text-anchor="middle" font-size="12" style="fill: var(--fig-line)">Source 2</text>

  <!-- writer -->
  <line x1="63" y1="86" x2="106" y2="108" style="stroke: var(--fig-line); stroke-width: 1.5" marker-end="url(#s2pl-a)"/>
  <line x1="63" y1="154" x2="106" y2="132" style="stroke: var(--fig-line); stroke-width: 1.5" marker-end="url(#s2pl-a)"/>
  <rect x="110" y="98" width="76" height="44" rx="6" style="fill: none; stroke: var(--fig-line); stroke-width: 1.5"/>
  <text x="148" y="125" text-anchor="middle" font-size="12.5" style="fill: var(--fig-line)">Writer</text>

  <!-- shared memory -->
  <line x1="186" y1="120" x2="222" y2="120" style="stroke: var(--fig-line); stroke-width: 1.5" marker-end="url(#s2pl-a)"/>
  <rect x="226" y="86" width="104" height="68" rx="3" style="fill: none; stroke: var(--fig-line); stroke-width: 1.25"/>
  <line x1="226" y1="120" x2="330" y2="120" style="stroke: var(--fig-line); stroke-width: 0.75"/>
  <text x="278" y="108" text-anchor="middle" font-size="10.5" style="fill: var(--fig-muted)">source 1 update</text>
  <text x="278" y="140" text-anchor="middle" font-size="10.5" style="fill: var(--fig-muted)">source 2 update</text>
  <text x="278" y="76" text-anchor="middle" font-size="12" style="fill: var(--fig-muted)">shared memory</text>
  <text x="278" y="172" text-anchor="middle" font-size="11" style="fill: var(--fig-muted)">age in memory</text>

  <!-- decision process -->
  <line x1="330" y1="120" x2="376" y2="120" style="stroke: var(--fig-line); stroke-width: 1.5" marker-end="url(#s2pl-a)"/>
  <text x="353" y="136" text-anchor="middle" font-size="10.5" style="fill: var(--fig-muted)">read pair</text>
  <rect x="380" y="94" width="120" height="52" rx="6" style="fill: none; stroke: var(--fig-line); stroke-width: 1.5"/>
  <text x="440" y="116" text-anchor="middle" font-size="12.5" style="fill: var(--fig-line)">Decision</text>
  <text x="440" y="133" text-anchor="middle" font-size="12.5" style="fill: var(--fig-line)">process</text>
  <text x="440" y="166" text-anchor="middle" font-size="11" style="fill: var(--fig-muted)">compute for T,</text>
  <text x="440" y="181" text-anchor="middle" font-size="11" style="fill: var(--fig-muted)">then wait W</text>
  <text x="440" y="80" text-anchor="middle" font-size="11" style="fill: var(--fig-muted)">age at the reader</text>

  <!-- monitor -->
  <line x1="500" y1="120" x2="546" y2="120" style="stroke: var(--fig-line); stroke-width: 1.5" marker-end="url(#s2pl-a)"/>
  <circle cx="578" cy="120" r="26" style="fill: none; stroke: var(--fig-line); stroke-width: 1.5"/>
  <text x="578" y="125" text-anchor="middle" font-size="12" style="fill: var(--fig-line)">Monitor</text>
  <text x="578" y="166" text-anchor="middle" font-size="11" style="fill: var(--fig-muted)">age at the monitor</text>

  <!-- decoupling note -->
  <text x="320" y="232" text-anchor="middle" font-size="12" style="fill: var(--fig-muted)">the sources publish on their own schedule, the reader only chooses when to sample</text>
</svg>
