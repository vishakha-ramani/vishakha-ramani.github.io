<svg viewBox="0 0 640 340" role="img" aria-label="Which primitive is fresher depends on the location update rate" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="p1reg-m" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" style="fill: var(--fig-muted)"/>
    </marker>
  </defs>

  <!-- axes -->
  <line x1="70" y1="272" x2="612" y2="272" style="stroke: var(--fig-muted); stroke-width: 1.25" marker-end="url(#p1reg-m)"/>
  <line x1="70" y1="272" x2="70" y2="38" style="stroke: var(--fig-muted); stroke-width: 1.25" marker-end="url(#p1reg-m)"/>
  <text x="340" y="300" text-anchor="middle" font-size="12.5" style="fill: var(--fig-muted)">location update rate</text>
  <text x="46" y="155" text-anchor="middle" font-size="12.5" style="fill: var(--fig-muted)" transform="rotate(-90 46 155)">average app update age</text>

  <!-- legend -->
  <rect x="86" y="46" width="18" height="4" rx="2" style="fill: var(--fig-rcu)"/>
  <text x="110" y="52" font-size="12" style="fill: var(--fig-line)">RCU</text>
  <rect x="150" y="46" width="18" height="4" rx="2" style="fill: var(--fig-rwl)"/>
  <text x="174" y="52" font-size="12" style="fill: var(--fig-line)">RWL</text>

  <!-- crossing guide -->
  <line x1="430" y1="272" x2="430" y2="90" stroke-dasharray="3 4" style="stroke: var(--fig-muted); stroke-width: 1"/>

  <!-- curves -->
  <path d="M85 215 C260 200 430 110 585 62" fill="none" style="stroke: var(--fig-rcu); stroke-width: 2"/>
  <path d="M85 168 C260 160 430 145 585 132" fill="none" style="stroke: var(--fig-rwl); stroke-width: 2"/>

  <!-- direct labels -->
  <rect x="548" y="50" width="14" height="3.5" rx="1.75" style="fill: var(--fig-rcu)"/>
  <text x="567" y="55" font-size="12.5" font-weight="600" style="fill: var(--fig-line)">RCU</text>
  <rect x="548" y="115" width="14" height="3.5" rx="1.75" style="fill: var(--fig-rwl)"/>
  <text x="567" y="120" font-size="12.5" font-weight="600" style="fill: var(--fig-line)">RWL</text>

  <!-- regime labels -->
  <text x="250" y="252" text-anchor="middle" font-size="12" style="fill: var(--fig-muted)">RCU serves fresher updates</text>
  <text x="522" y="252" text-anchor="middle" font-size="12" style="fill: var(--fig-muted)">RWL serves fresher updates</text>

  <!-- preemption inset -->
  <g>
    <rect x="440" y="160" width="160" height="70" rx="5" style="fill: none; stroke: var(--fig-muted); stroke-width: 0.75"/>
    <text x="450" y="177" font-size="11" style="fill: var(--fig-muted)">age cut by preemption</text>
    <rect x="450" y="186" width="34" height="9" rx="2" style="fill: var(--fig-rcu)"/>
    <text x="490" y="194" font-size="11" style="fill: var(--fig-line)">15% RCU</text>
    <rect x="450" y="203" width="102" height="9" rx="2" style="fill: var(--fig-rwl)"/>
    <text x="558" y="211" font-size="11" style="fill: var(--fig-line)">45% RWL</text>
  </g>
</svg>
