<svg viewBox="0 0 640 330" role="img" aria-label="The optimal reader samples at the first fresh update after the client age crosses the threshold" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="s2th-m" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" style="fill: var(--fig-muted)"/>
    </marker>
  </defs>

  <!-- axes -->
  <line x1="70" y1="262" x2="612" y2="262" style="stroke: var(--fig-muted); stroke-width: 1.25" marker-end="url(#s2th-m)"/>
  <line x1="70" y1="262" x2="70" y2="38" style="stroke: var(--fig-muted); stroke-width: 1.25" marker-end="url(#s2th-m)"/>
  <text x="340" y="308" text-anchor="middle" font-size="12.5" style="fill: var(--fig-muted)">time in slots</text>
  <text x="46" y="150" text-anchor="middle" font-size="12.5" style="fill: var(--fig-muted)" transform="rotate(-90 46 150)">age at the client</text>

  <!-- threshold -->
  <line x1="70" y1="120" x2="600" y2="120" stroke-dasharray="6 4" style="stroke: var(--fig-line); stroke-width: 1.3"/>
  <text x="80" y="110" font-size="12.5" font-weight="600" style="fill: var(--fig-line)">threshold Y&#8320;</text>

  <!-- client age path -->
  <path d="M85 246 L320 118 L360 96 L360 238 L560 128 L575 120"
        fill="none" style="stroke: var(--fig-rcu); stroke-width: 2"/>

  <!-- publish markers on the time axis -->
  <path d="M175 272 L185 272 L180 281 z" style="fill: var(--fig-muted)"/>
  <path d="M355 272 L365 272 L360 281 z" style="fill: var(--fig-muted)"/>
  <text x="180" y="296" text-anchor="middle" font-size="10.5" style="fill: var(--fig-muted)">fresh update</text>
  <text x="360" y="296" text-anchor="middle" font-size="10.5" style="fill: var(--fig-muted)">fresh update</text>

  <!-- skip annotation -->
  <line x1="180" y1="268" x2="180" y2="200" stroke-dasharray="2 4" style="stroke: var(--fig-muted); stroke-width: 0.8"/>
  <text x="250" y="234" text-anchor="middle" font-size="11.5" style="fill: var(--fig-muted)">below Y&#8320;, skip and keep idling</text>

  <!-- sample annotation -->
  <line x1="360" y1="268" x2="360" y2="245" stroke-dasharray="2 4" style="stroke: var(--fig-muted); stroke-width: 0.8"/>
  <text x="452" y="70" text-anchor="middle" font-size="11.5" style="fill: var(--fig-muted)">first fresh update past the threshold,</text>
  <text x="452" y="85" text-anchor="middle" font-size="11.5" style="fill: var(--fig-muted)">sample and reset the client</text>
  <line x1="400" y1="90" x2="364" y2="150" style="stroke: var(--fig-muted); stroke-width: 0.8"/>
</svg>
