  <text x="340" y="292" text-anchor="middle" font-size="12.5" style="fill: var(--fig-muted)">measured latency</text>
  <text x="46" y="150" text-anchor="middle" font-size="12.5" style="fill: var(--fig-muted)" transform="rotate(-90 46 150)">predicted latency</text>

  <!-- y = x -->
