<svg viewBox="0 0 640 320" role="img" aria-label="Predicted latency tracks measured latency along the diagonal for both models" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="m1ft-m" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" style="fill: var(--fig-muted)"/>
    </marker>
  </defs>

  <!-- axes -->
  <line x1="70" y1="262" x2="612" y2="262" style="stroke: var(--fig-muted); stroke-width: 1.25" marker-end="url(#m1ft-m)"/>
