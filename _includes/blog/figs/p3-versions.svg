<svg viewBox="0 0 640 370" role="img" aria-label="RCU version chain with pinned readers and the sawtooth age of the current update" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="p3v-m" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" style="fill: var(--fig-muted)"/>
    </marker>
  </defs>

  <!-- grace period bracket over pinned versions -->
  <path d="M170 52 v-8 h300 v8" fill="none" style="stroke: var(--fig-muted); stroke-width: 1"/>
  <text x="320" y="34" text-anchor="middle" font-size="12" style="fill: var(--fig-muted)">alive until their last reader finishes</text>

  <!-- version boxes -->
  <rect x="60" y="62" width="80" height="34" rx="5" stroke-dasharray="4 3" style="fill: none; stroke: var(--fig-muted); stroke-width: 1.25"/>
  <text x="100" y="84" text-anchor="middle" font-size="12.5" style="fill: var(--fig-muted)">v1</text>
  <text x="100" y="116" text-anchor="middle" font-size="10.5" style="fill: var(--fig-muted)">reclaimed</text>

  <rect x="170" y="62" width="80" height="34" rx="5" style="fill: none; stroke: var(--fig-line); stroke-width: 1.4"/>
  <text x="210" y="84" text-anchor="middle" font-size="12.5" style="fill: var(--fig-line)">v2</text>
  <rect x="280" y="62" width="80" height="34" rx="5" style="fill: none; stroke: var(--fig-line); stroke-width: 1.4"/>
  <text x="320" y="84" text-anchor="middle" font-size="12.5" style="fill: var(--fig-line)">v3</text>
  <rect x="390" y="62" width="80" height="34" rx="5" style="fill: none; stroke: var(--fig-line); stroke-width: 1.4"/>
  <text x="430" y="84" text-anchor="middle" font-size="12.5" style="fill: var(--fig-line)">v4</text>
  <rect x="500" y="62" width="80" height="34" rx="5" style="fill: var(--fig-rcu)"/>
  <text x="540" y="84" text-anchor="middle" font-size="12.5" font-weight="600" style="fill: var(--fig-surface)">v5</text>
  <text x="540" y="116" text-anchor="middle" font-size="10.5" style="fill: var(--fig-muted)">current</text>

  <!-- readers pinning old versions -->
  <line x1="198" y1="96" x2="198" y2="134" style="stroke: var(--fig-muted); stroke-width: 1"/>
  <circle cx="198" cy="142" r="7" style="fill: none; stroke: var(--fig-line); stroke-width: 1.4"/>
  <line x1="222" y1="96" x2="222" y2="159" style="stroke: var(--fig-muted); stroke-width: 1"/>
  <circle cx="222" cy="167" r="7" style="fill: none; stroke: var(--fig-line); stroke-width: 1.4"/>
  <line x1="320" y1="96" x2="320" y2="134" style="stroke: var(--fig-muted); stroke-width: 1"/>
  <circle cx="320" cy="142" r="7" style="fill: none; stroke: var(--fig-line); stroke-width: 1.4"/>
  <line x1="430" y1="96" x2="430" y2="150" style="stroke: var(--fig-muted); stroke-width: 1"/>
  <circle cx="430" cy="158" r="7" style="fill: none; stroke: var(--fig-line); stroke-width: 1.4"/>
  <text x="320" y="200" text-anchor="middle" font-size="12" style="fill: var(--fig-muted)">readers pin the copy they started with</text>

  <!-- alignment guides from publishes to sawtooth resets -->
  <line x1="210" y1="222" x2="210" y2="332" stroke-dasharray="2 4" style="stroke: var(--fig-muted); stroke-width: 0.7"/>
  <line x1="320" y1="222" x2="320" y2="332" stroke-dasharray="2 4" style="stroke: var(--fig-muted); stroke-width: 0.7"/>
  <line x1="430" y1="222" x2="430" y2="332" stroke-dasharray="2 4" style="stroke: var(--fig-muted); stroke-width: 0.7"/>
  <line x1="540" y1="222" x2="540" y2="332" stroke-dasharray="2 4" style="stroke: var(--fig-muted); stroke-width: 0.7"/>

  <!-- sawtooth age of the current update -->
  <line x1="60" y1="332" x2="600" y2="332" style="stroke: var(--fig-muted); stroke-width: 1.1" marker-end="url(#p3v-m)"/>
  <line x1="60" y1="332" x2="60" y2="236" style="stroke: var(--fig-muted); stroke-width: 1.1" marker-end="url(#p3v-m)"/>
  <text x="68" y="232" font-size="11.5" style="fill: var(--fig-muted)">age of the current update</text>
  <path d="M100 322 L210 268 L210 322 L320 268 L320 322 L430 268 L430 322 L540 268 L540 322 L590 298"
        fill="none" style="stroke: var(--fig-rcu); stroke-width: 2"/>
  <text x="330" y="356" text-anchor="middle" font-size="12" style="fill: var(--fig-muted)">each publish resets the age, faster writing means a lower sawtooth</text>
</svg>
