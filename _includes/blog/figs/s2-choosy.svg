<svg viewBox="0 0 640 300" role="img" aria-label="The optimal threshold rises with the update probability and with the sampling cost" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="s2ch-m" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" style="fill: var(--fig-muted)"/>
    </marker>
  </defs>

  <!-- axes -->
  <line x1="70" y1="242" x2="612" y2="242" style="stroke: var(--fig-muted); stroke-width: 1.25" marker-end="url(#s2ch-m)"/>
  <line x1="70" y1="242" x2="70" y2="38" style="stroke: var(--fig-muted); stroke-width: 1.25" marker-end="url(#s2ch-m)"/>
  <text x="340" y="272" text-anchor="middle" font-size="12.5" style="fill: var(--fig-muted)">how often the memory refreshes</text>
  <text x="46" y="140" text-anchor="middle" font-size="12.5" style="fill: var(--fig-muted)" transform="rotate(-90 46 140)">optimal threshold Y&#8320;</text>

  <!-- legend -->
  <rect x="90" y="50" width="18" height="4" rx="2" style="fill: var(--fig-rwl)"/>
  <text x="114" y="56" font-size="12" style="fill: var(--fig-line)">expensive reads</text>
  <rect x="230" y="50" width="18" height="4" rx="2" style="fill: var(--fig-rcu)"/>
  <text x="254" y="56" font-size="12" style="fill: var(--fig-line)">cheap reads</text>

  <!-- staircase curves -->
  <path d="M90 205 L170 205 L170 190 L260 190 L260 172 L370 172 L370 152 L480 152 L480 140 L585 140"
        fill="none" style="stroke: var(--fig-rcu); stroke-width: 2"/>
  <path d="M90 168 L160 168 L160 140 L240 140 L240 112 L340 112 L340 88 L460 88 L460 74 L585 74"
        fill="none" style="stroke: var(--fig-rwl); stroke-width: 2"/>

  <!-- reading -->
  <text x="470" y="215" text-anchor="middle" font-size="12" style="fill: var(--fig-muted)">frequent updates make the reader choosier,</text>
  <text x="470" y="230" text-anchor="middle" font-size="12" style="fill: var(--fig-muted)">a better opportunity is always close</text>
</svg>
