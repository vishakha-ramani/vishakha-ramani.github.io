<svg viewBox="0 0 640 300" role="img" aria-label="The three parallel policies ordered by how much the servers coordinate" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="s2po-m" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" style="fill: var(--fig-muted)"/>
    </marker>
  </defs>

  <!-- panel 1: independent -->
  <g>
    <text x="110" y="30" text-anchor="middle" font-size="12.5" font-weight="600" style="fill: var(--fig-line)">Independent</text>
    <rect x="35" y="52" width="150" height="34" rx="5" style="fill: none; stroke: var(--fig-line); stroke-width: 1.4"/>
    <rect x="35" y="52" width="75" height="5" rx="2.5" style="fill: var(--fig-rcu)"/>
    <rect x="110" y="52" width="75" height="5" rx="2.5" style="fill: var(--fig-rwl)"/>
    <text x="110" y="75" text-anchor="middle" font-size="11" style="fill: var(--fig-line)">Server A</text>
    <rect x="35" y="132" width="150" height="34" rx="5" style="fill: none; stroke: var(--fig-line); stroke-width: 1.4"/>
    <rect x="35" y="132" width="75" height="5" rx="2.5" style="fill: var(--fig-rcu)"/>
    <rect x="110" y="132" width="75" height="5" rx="2.5" style="fill: var(--fig-rwl)"/>
    <text x="110" y="155" text-anchor="middle" font-size="11" style="fill: var(--fig-line)">Server B</text>
    <text x="110" y="112" text-anchor="middle" font-size="10.5" style="fill: var(--fig-muted)">no signals</text>
    <text x="110" y="196" text-anchor="middle" font-size="11" style="fill: var(--fig-muted)">each works alone,</text>
    <text x="110" y="211" text-anchor="middle" font-size="11" style="fill: var(--fig-muted)">deliveries can arrive already stale</text>
  </g>

  <!-- panel 2: coordinated restarts -->
  <g>
    <text x="320" y="30" text-anchor="middle" font-size="12.5" font-weight="600" style="fill: var(--fig-line)">Coordinated restarts</text>
    <rect x="245" y="52" width="150" height="34" rx="5" style="fill: none; stroke: var(--fig-line); stroke-width: 1.4"/>
    <rect x="245" y="52" width="75" height="5" rx="2.5" style="fill: var(--fig-rcu)"/>
    <rect x="320" y="52" width="75" height="5" rx="2.5" style="fill: var(--fig-rwl)"/>
    <text x="320" y="75" text-anchor="middle" font-size="11" style="fill: var(--fig-line)">Server A</text>
    <rect x="245" y="132" width="150" height="34" rx="5" style="fill: none; stroke: var(--fig-line); stroke-width: 1.4"/>
    <rect x="245" y="132" width="75" height="5" rx="2.5" style="fill: var(--fig-rcu)"/>
    <rect x="320" y="132" width="75" height="5" rx="2.5" style="fill: var(--fig-rwl)"/>
    <text x="320" y="155" text-anchor="middle" font-size="11" style="fill: var(--fig-line)">Server B</text>
    <line x1="320" y1="92" x2="320" y2="126" stroke-dasharray="4 3" style="stroke: var(--fig-muted); stroke-width: 1.2" marker-start="url(#s2po-m)" marker-end="url(#s2po-m)"/>
    <text x="330" y="112" font-size="10.5" style="fill: var(--fig-muted)">watches</text>
    <text x="320" y="196" text-anchor="middle" font-size="11" style="fill: var(--fig-muted)">a server behind its twin</text>
    <text x="320" y="211" text-anchor="middle" font-size="11" style="fill: var(--fig-muted)">abandons and restarts fresh</text>
  </g>

  <!-- panel 3: shared intermediate -->
  <g>
    <text x="530" y="30" text-anchor="middle" font-size="12.5" font-weight="600" style="fill: var(--fig-line)">Shared intermediate</text>
    <rect x="455" y="52" width="150" height="34" rx="5" style="fill: none; stroke: var(--fig-line); stroke-width: 1.4"/>
    <rect x="455" y="52" width="75" height="5" rx="2.5" style="fill: var(--fig-rcu)"/>
    <rect x="530" y="52" width="75" height="5" rx="2.5" style="fill: var(--fig-rwl)"/>
    <text x="530" y="75" text-anchor="middle" font-size="11" style="fill: var(--fig-line)">Server A</text>
    <rect x="455" y="132" width="150" height="34" rx="5" style="fill: none; stroke: var(--fig-line); stroke-width: 1.4"/>
    <rect x="455" y="132" width="75" height="5" rx="2.5" style="fill: var(--fig-rcu)"/>
    <rect x="530" y="132" width="75" height="5" rx="2.5" style="fill: var(--fig-rwl)"/>
    <text x="530" y="155" text-anchor="middle" font-size="11" style="fill: var(--fig-line)">Server B</text>
    <line x1="512" y1="92" x2="512" y2="126" style="stroke: var(--fig-line); stroke-width: 1.6"/>
    <line x1="548" y1="92" x2="548" y2="126" style="stroke: var(--fig-line); stroke-width: 1.6"/>
    <text x="530" y="196" text-anchor="middle" font-size="11" style="fill: var(--fig-muted)">one step one result shared,</text>
    <text x="530" y="211" text-anchor="middle" font-size="11" style="fill: var(--fig-muted)">both attack step two together</text>
  </g>

  <!-- coordination axis -->
  <line x1="80" y1="252" x2="560" y2="252" style="stroke: var(--fig-muted); stroke-width: 1.1" marker-end="url(#s2po-m)"/>
  <text x="320" y="278" text-anchor="middle" font-size="12" style="fill: var(--fig-muted)">more coordination, less wasted power</text>
</svg>
