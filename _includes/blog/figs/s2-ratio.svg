<svg viewBox="0 0 640 320" role="img" aria-label="Average age against the rate ratio has its minimum at the same ratio for every power budget" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="s2rt-m" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" style="fill: var(--fig-muted)"/>
    </marker>
  </defs>

  <!-- axes -->
  <line x1="70" y1="252" x2="612" y2="252" style="stroke: var(--fig-muted); stroke-width: 1.25" marker-end="url(#s2rt-m)"/>
  <line x1="70" y1="252" x2="70" y2="38" style="stroke: var(--fig-muted); stroke-width: 1.25" marker-end="url(#s2rt-m)"/>
  <text x="340" y="296" text-anchor="middle" font-size="12.5" style="fill: var(--fig-muted)">rate ratio &#961; = &#956;&#8321;/&#956;&#8322;</text>
  <text x="46" y="145" text-anchor="middle" font-size="12.5" style="fill: var(--fig-muted)" transform="rotate(-90 46 145)">average age at the monitor</text>

  <!-- rho = 1 tick -->
  <line x1="360" y1="252" x2="360" y2="259" style="stroke: var(--fig-muted); stroke-width: 1"/>
  <text x="360" y="273" text-anchor="middle" font-size="11.5" style="fill: var(--fig-muted)">&#961; = 1</text>

  <!-- optimum guide -->
  <line x1="291" y1="252" x2="291" y2="88" stroke-dasharray="6 4" style="stroke: var(--fig-line); stroke-width: 1.3"/>
  <text x="291" y="60" text-anchor="middle" font-size="12.5" font-weight="600" style="fill: var(--fig-line)">the optimum, &#961;* &#8776; 0.846</text>
  <text x="291" y="76" text-anchor="middle" font-size="11.5" style="fill: var(--fig-muted)">step two faster than step one</text>

  <!-- legend -->
  <rect x="440" y="50" width="18" height="4" rx="2" style="fill: var(--fig-rwl)"/>
  <text x="464" y="56" font-size="12" style="fill: var(--fig-line)">smaller budget</text>
  <rect x="440" y="70" width="18" height="4" rx="2" style="fill: var(--fig-rcu)"/>
  <text x="464" y="76" font-size="12" style="fill: var(--fig-line)">larger budget</text>

  <!-- curves -->
  <path d="M95 118 C180 168 250 190 291 192 C340 194 460 172 585 118" fill="none" style="stroke: var(--fig-rwl); stroke-width: 2"/>
  <path d="M95 172 C180 216 250 232 291 234 C340 236 460 216 585 172" fill="none" style="stroke: var(--fig-rcu); stroke-width: 2"/>
  <circle cx="291" cy="192" r="4.5" style="fill: var(--fig-rwl)"/>
  <circle cx="291" cy="234" r="4.5" style="fill: var(--fig-rcu)"/>
</svg>
