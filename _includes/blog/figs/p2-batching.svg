<svg viewBox="0 0 640 190" role="img" aria-label="Below the knee packets ship alone, above it they age while a batch fills" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="p2b-a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" style="fill: var(--fig-line)"/>
    </marker>
  </defs>

  <!-- divider -->
  <line x1="320" y1="20" x2="320" y2="160" style="stroke: var(--fig-muted); stroke-width: 0.5"/>

  <!-- left panel: below the knee -->
  <text x="160" y="32" text-anchor="middle" font-size="13" font-weight="600" style="fill: var(--fig-line)">Below the knee</text>
  <rect x="52" y="70" width="22" height="22" rx="4" style="fill: none; stroke: var(--fig-line); stroke-width: 1.4"/>
  <line x1="80" y1="81" x2="102" y2="81" style="stroke: var(--fig-line); stroke-width: 1.25" marker-end="url(#p2b-a)"/>
  <rect x="112" y="70" width="22" height="22" rx="4" style="fill: none; stroke: var(--fig-line); stroke-width: 1.4"/>
  <line x1="140" y1="81" x2="162" y2="81" style="stroke: var(--fig-line); stroke-width: 1.25" marker-end="url(#p2b-a)"/>
  <rect x="172" y="70" width="22" height="22" rx="4" style="fill: none; stroke: var(--fig-line); stroke-width: 1.4"/>
  <line x1="200" y1="81" x2="222" y2="81" style="stroke: var(--fig-line); stroke-width: 1.25" marker-end="url(#p2b-a)"/>
  <rect x="232" y="60" width="44" height="44" rx="5" style="fill: none; stroke: var(--fig-line); stroke-width: 1.5"/>
  <text x="254" y="87" text-anchor="middle" font-size="11.5" style="fill: var(--fig-line)">NIC</text>
  <text x="160" y="140" text-anchor="middle" font-size="12" style="fill: var(--fig-muted)">each packet goes out at once</text>

  <!-- right panel: above the knee -->
  <text x="480" y="32" text-anchor="middle" font-size="13" font-weight="600" style="fill: var(--fig-line)">Above the knee</text>
  <rect x="350" y="52" width="146" height="62" rx="6" stroke-dasharray="5 4" style="fill: none; stroke: var(--fig-muted); stroke-width: 1.25"/>
  <rect x="358" y="58" width="20" height="20" rx="4" style="fill: none; stroke: var(--fig-line); stroke-width: 1.4"/>
  <rect x="388" y="58" width="20" height="20" rx="4" style="fill: none; stroke: var(--fig-line); stroke-width: 1.4"/>
  <rect x="418" y="58" width="20" height="20" rx="4" style="fill: none; stroke: var(--fig-line); stroke-width: 1.4"/>
  <rect x="448" y="58" width="20" height="20" rx="4" style="fill: none; stroke: var(--fig-line); stroke-width: 1.4"/>
  <rect x="358" y="86" width="20" height="20" rx="4" style="fill: none; stroke: var(--fig-line); stroke-width: 1.4"/>
  <rect x="388" y="86" width="20" height="20" rx="4" style="fill: none; stroke: var(--fig-line); stroke-width: 1.4"/>
  <line x1="502" y1="83" x2="536" y2="83" style="stroke: var(--fig-line); stroke-width: 2.5" marker-end="url(#p2b-a)"/>
  <rect x="546" y="61" width="44" height="44" rx="5" style="fill: none; stroke: var(--fig-line); stroke-width: 1.5"/>
  <text x="568" y="88" text-anchor="middle" font-size="11.5" style="fill: var(--fig-line)">NIC</text>
  <text x="423" y="140" text-anchor="middle" font-size="12" style="fill: var(--fig-muted)">age grows while the batch fills</text>
  <text x="568" y="128" text-anchor="middle" font-size="11" style="fill: var(--fig-muted)">one burst</text>
</svg>
